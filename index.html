<!DOCTYPE html>
<html>
<head>
    <title>JPMC Financial Partners</title>
    <style>
body{
    background:#f4f7fb;
    font-family:Arial;
    text-align:center;
    margin-top:100px;
}
button{
    background:skyblue;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    font-size:16px;
}
h1{
    color:#003366;
    font-size:36px;
}

p{
    color:#555;
    font-size:18px;
}
input{
    width:300px;
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:5px;
}
.container{
    width:80%;
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
}
</style>
</head>
<body>
  <div class="container">
<img src="logo.jpg" width="120" alt="JPMC Logo">
    <h1> Welcome to JPMC Financial Partners</h1>
    <p>We're here to provide trusted financial solutions and personalized support. Start a chat with one of our specialists today</p>

    <input id="message" type="text" placeholder="Type a message">
    <button  onclick="startChat()">Start Chat</button>
    <p id="output"></p>
</div>
<script>
function startChat() {
    let message = document.getElementById("message").value;

    document.getElementById("output").innerHTML +=
        "<p><strong>You:</strong> " + message + "</p>";

    document.getElementById("message").value = "";
}
</script>
</body>
</html>
